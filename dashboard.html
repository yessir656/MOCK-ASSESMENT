<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<!-- ==========================================
     DASHBOARD SKELETON
========================================== -->

<div id="dashboardSkeleton">

    <div class="container-fluid py-4">

        <!-- Header -->

        <div class="card shadow-sm border-0 mb-4">

            <div class="card-body">

                <div class="skeleton skeleton-header"></div>

                <div class="skeleton skeleton-small mt-3"></div>

            </div>

        </div>

        <!-- Controls -->

        <div class="card shadow-sm border-0 mb-4">

            <div class="card-body">

                <div class="row g-3">

                    <div class="col-lg-2">
                        <div class="skeleton skeleton-button"></div>
                    </div>

                    <div class="col-lg-6">
                        <div class="skeleton skeleton-input"></div>
                    </div>

                    <div class="col-lg-4">
                        <div class="skeleton skeleton-input"></div>
                    </div>

                </div>

            </div>

        </div>

        <!-- Table -->

        <div class="card shadow-sm border-0">

            <div class="table-responsive">

                <table class="table">

                    <tbody>

                        <tr>

                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>

                        </tr>

                        <tr>

                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>

                        </tr>

                        <tr>

                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>

                        </tr>

                        <tr>

                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>

                        </tr>

                        <tr>

                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>
                            <td><div class="skeleton skeleton-cell"></div></td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
<div id="dashboardContent" hidden>
    <div class="container-fluid py-4">
    

    <!-- HEADER -->

    <div class="card shadow-sm border-0 mb-4">

        <div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center">

            <div>

                <h2 class="mb-1">

                    Employee Management System

                </h2>

                <p id="welcomeMessage" class="mb-0"></p>

                <small id="roleMessage"></small>

            </div>

            <button
                id="logoutButton"
                class="btn btn-danger mt-3 mt-lg-0">

                Logout

            </button>

        </div>

    </div>

    <!-- CONTROLS -->

    <div class="card shadow-sm border-0 mb-4">

        <div class="card-body">

            <div class="row g-3">

                <div
                    id="addEmployeeColumn" 
                    class="col-lg-2 col-md-6">

                    <button
                        id="addEmployeeButton"
                         class="btn btn-primary w-100 h-100">

                        Add Employee

                    </button>

                </div>

                <div class="col-lg-6 col-md-6">

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Search Employees">

                </div>

                <div class="col-lg-4">

                    <select
                        id="sortSelect"
                        class="form-select">

                        <option value="">Sort By</option>

                        <option value ="id">ID</option>

                        <option value="firstName">First Name</option>

                        <option value="lastName">Last Name</option>

                        <option value="email">Email</option>

                        <option value="age">Age (Youngest)</option>

                        <option value="ageDesc">Age (Oldest)</option>

                    </select>

                </div>

            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div id="employeeModal" class="modal">

        <div class="modal-content">

            <h2 id="modalTitle">Add Employee</h2>

            <input type="hidden" id="employeeId">

            <input type="text" id="firstName" placeholder="First Name">

            <input type="text" id="lastName" placeholder="Last Name">

            <input type="email" id="email" placeholder="Email">

            <input type="number" id="age" placeholder="Age">

            <button id="saveEmployeeButton">

                Save

            </button>

            <button id="cancelButton">

                Cancel

            </button>

        </div>

    </div>


    <!-- TABLE -->

    <div class="card shadow-sm border-0">

        <div class="table-responsive">

            <table
                id="employeeTable"
                class="table table-hover align-middle mb-0">

                <thead class="table-primary">

                    <tr id ="tableHeader">

                        <th>ID</th>

                        <th>Full Name</th>

                        <th>Email</th>

                        <th>Age</th>


                    </tr>

                </thead>

                <tbody id="employeeTableBody"></tbody>

            </table>

        </div>

    </div>

    <!-- PAGINATION -->
<div class="pagination-wrapper">

    <button
        id="prevPageButton"
        class="btn btn-outline-primary">

        Previous

    </button>

    <span id="currentPage"></span>

    <button
        id="nextPageButton"
        class="btn btn-outline-primary">

        Next

    </button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/employee.js"></script>

</body>

</html>
